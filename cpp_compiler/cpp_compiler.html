        // 代码分析函数
        function analyzeCode(code) {
            var lines = code.split('\n');
            var result = {
                includes: [],
                functions: [],
                classes: [],
                loops: 0,
                conditions: 0,
                hasMain: false,
                hasReturn: false,
                usesNamespace: false,
                lineCount: lines.length,
                variables: [],
                hasNewWithoutDelete: false,
                hasRawPointers: false,
                issues: []
            };

            var hasNew = false;
            var hasDelete = false;

            for (var i = 0; i < lines.length; i++) {
                var t = lines[i].trim();
                if (t.startsWith('#include')) result.includes.push(t);
                if (t.match(/int\s+main\s*\(/)) result.hasMain = true;
                if (t.match(/return\s/)) result.hasReturn = true;
                if (t.match(/using\s+namespace\s+std/)) result.usesNamespace = true;
                if (t.match(/\bfor\s*\(/)) result.loops++;
                if (t.match(/\bwhile\s*\(/)) result.loops++;
                if (t.match(/\bdo\s*\{/)) result.loops++;
                if (t.match(/\bif\s*\(/)) result.conditions++;
                if (t.match(/\bclass\s+(\w+)/)) {
                    var cm = t.match(/\bclass\s+(\w+)/);
                    if (cm) result.classes.push(cm[1]);
                }
                if (t.match(/\bnew\s+/)) hasNew = true;
                if (t.match(/\bdelete\s/)) hasDelete = true;
                if (t.match(/\w+\s*\*\s*\w+/)) result.hasRawPointers = true;

                var funcMatch = t.match(/^(int|void|double|float|long|char|bool|string|auto|vector|map|set)\s+(\w+)\s*\([^)]*\)/);
                if (funcMatch && funcMatch[2] !== 'main') {
                    result.functions.push(funcMatch[2]);
                }
            }

            result.hasNewWithoutDelete = hasNew && !hasDelete;

            if (!result.hasMain) result.issues.push('没有找到 main() 函数');
            if (result.hasMain && !result.hasReturn) result.issues.push('main() 函数可能缺少 return 语句');
            if (result.hasNewWithoutDelete) result.issues.push('使用了 new 但没有对应的 delete，可能存在内存泄漏');
            if (result.includes.length === 0) result.issues.push('没有 #include 头文件');
            if (code.includes('using namespace std') && code.includes('#include')) {
                // ok
            }

            return result;
        }

        // 简易 Markdown 渲染
        function renderMarkdown(text) {
            let html = text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');

            // 代码块
            html = html.replace(/```(\w*)\n([\s\S]*?)```/g, function(match, lang, code) {
                return '<pre><code data-lang="' + (lang || 'code') + '">' + code.trim() + '</code></pre>';
            });

            // 行内代码
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

            // 粗体
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

            // 斜体
            html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');

            // 段落和换行
            html = html.replace(/\n\n/g, '</p><p>');
            html = html.replace(/\n/g, '<br>');
            html = '<p>' + html + '</p>';

            // 清理 pre 周围多余的 p 标签
            html = html.replace(/<p><pre>/g, '<pre>');
            html = html.replace(/<\/pre><\/p>/g, '</pre>');
            html = html.replace(/<p><\/p>/g, '');

            return html;
        }

        // 快捷操作处理
        function handleQuickAction(action, code) {
            var info = analyzeCode(code);

            if (action === 'explain') {
                var resp = '**代码分析结果：**\n\n';
                resp += '该程序共 **' + info.lineCount + '** 行代码。\n\n';
                if (info.includes.length > 0) {

                    for (var i = 0; i < info.includes.length; i++) {

                        var lib = inc.match(/<(.+?)>/);
                        var desc = '';
                        if (lib) {
                            var libName = lib[1];
                            if (libName === 'iostream') desc = ' - 输入输出';
                            else if (libName === 'vector') desc = ' - 动态数组';
                            else if (libName === 'string') desc = ' - 字符串';
                            else if (libName === 'algorithm') desc = ' - 算法';
                            else if (libName === 'map') desc = ' - 有序映射';
                            else if (libName === 'unordered_map') desc = ' - 哈希映射';
                            else if (libName === 'set') desc = ' - 集合';
                            else if (libName === 'stack') desc = ' - 栈';
                            else if (libName === 'queue') desc = ' - 队列';
                            else if (libName === 'fstream') desc = ' - 文件读写';
                            else if (libName === 'cmath') desc = ' - 数学函数';
                            else if (libName === 'memory') desc = ' - 智能指针';
                            else if (libName === 'numeric') desc = ' - 数值算法';
                        }
                        resp += '- `' + inc + '`' + desc + '\n';
                    }
                    resp += '\n';
                }
                if (info.hasMain) resp += '包含 `main()` 函数（程序入口）。\n';
                if (info.usesNamespace) resp += '使用了 `using namespace std;`。\n';
                if (info.functions.length > 0) resp += '定义了 **' + info.functions.length + '** 个自定义函数：`' + info.functions.join('`, `') + '`\n';
                if (info.classes.length > 0) resp += '定义了 **' + info.classes.length + '** 个类：`' + info.classes.join('`, `') + '`\n';
                if (info.loops > 0) resp += '包含 **' + info.loops + '** 个循环结构\n';
                if (info.conditions > 0) resp += '包含 **' + info.conditions + '** 个条件判断\n';
                resp += '\n想了解具体的 C++ 概念？可以直接问我，比如输入 "指针"、"vector"、"类" 等关键词。';
                return resp;
            }

            if (action === 'debug') {
                var resp = '**代码检查结果：**\n\n';
                var issueCount = 0;

                if (info.issues.length > 0) {
                    for (var i = 0; i < info.issues.length; i++) {
                        resp += '⚠️ ' + info.issues[i] + '\n';
                        issueCount++;
                    }
                    resp += '\n';
                }

                // 额外检查
                var lines = code.split('\n');
                for (var i = 0; i < lines.length; i++) {
                    var t = lines[i].trim();
                    if (t.match(/if\s*\(\s*\w+\s*=\s*[^=]/)) {
                        resp += '⚠️ 第 ' + (i+1) + ' 行：`if` 中使用了 `=`（赋值），是否应该用 `==`（比较）？\n';
                        issueCount++;
                    }
                    if (t.match(/^\s*(int|double|float)\s+\w+\s*;/) && !t.includes('=')) {
                        resp += '💡 第 ' + (i+1) + ' 行：变量声明未初始化，建议赋初始值\n';
                        issueCount++;
                    }
                }

                if (code.includes('endl') && !code.includes('iostream')) {
                    resp += '⚠️ 使用了 `endl` 但可能没有引入 `<iostream>`\n';
                    issueCount++;
                }
                if (code.includes('vector') && !code.includes('#include <vector>') && !code.includes('bits/stdc++')) {
                    resp += '⚠️ 使用了 `vector` 但可能没有引入 `<vector>`\n';
                    issueCount++;
                }
                if (code.includes('string ') && !code.includes('#include <string>') && !code.includes('bits/stdc++') && !code.includes('#include <iostream>')) {
                    resp += '⚠️ 使用了 `string` 但可能没有引入 `<string>`\n';
                    issueCount++;
                }
                if (code.includes('sort(') && !code.includes('#include <algorithm>') && !code.includes('bits/stdc++')) {
                    resp += '⚠️ 使用了 `sort` 但可能没有引入 `<algorithm>`\n';
                    issueCount++;
                }

                if (issueCount === 0) {
                    resp += '✅ 没有发现明显的问题！代码看起来不错。\n\n';
                    resp += '**提示：** 可以点击上方的 **▶ 运行** 按钮来实际编译测试，查看是否有运行时错误。';
                } else {
                    resp += '\n共发现 **' + issueCount + '** 个潜在问题。\n请根据提示逐一检查修复。';
                }
                return resp;
            }

            if (action === 'optimize') {
                var resp = '**优化建议：**\n\n';
                var tips = [];

                if (info.usesNamespace) {
                    tips.push('考虑不使用 `using namespace std;`，改用 `std::` 前缀，避免命名冲突');
                }
                if (info.hasRawPointers) {
                    tips.push('建议使用 **智能指针**（`unique_ptr`、`shared_ptr`）替代裸指针，防止内存泄漏');
                }
                if (info.hasNewWithoutDelete) {
                    tips.push('检测到 `new` 但没有对应的 `delete`，建议使用 `make_unique` / `make_shared` 代替');
                }
                if (code.includes('endl')) {
                    tips.push('`endl` 会刷新缓冲区，大量输出时用 `"\\n"` 替代 `endl` 可提升性能');
                }
                if (code.match(/vector<.+>\s+\w+\s*\)/)) {
                    tips.push('函数参数中的 `vector` 建议使用 `const vector<T>&` 传引用，避免复制');
                }
                if (code.includes('push_back') && code.includes('for')) {
                    tips.push('在循环中使用 `push_back` 前，考虑先用 `reserve()` 预分配空间');
                }
                if (code.includes('.size()') && code.includes('for') && code.match(/i\s*<\s*\w+\.size\(\)/)) {
                    tips.push('循环条件中反复调用 `.size()` 可以提取为变量');
                }

                tips.push('使用 `const` 修饰不需要修改的变量和参数');
                tips.push('使用 `auto` 简化复杂类型声明');
                tips.push('优先使用范围 for 循环 `for (auto& x : container)`');

                for (var i = 0; i < tips.length; i++) {

        // 打字动画效果
        function typeResponse(content) {
            var messages = document.getElementById('chatMessages');
            var welcome = messages.querySelector('.chat-welcome');
            if (welcome) welcome.remove();

            var msgDiv = document.createElement('div');
            msgDiv.className = 'chat-msg bot';

            var avatar = document.createElement('div');
            avatar.className = 'chat-msg-avatar';
            avatar.textContent = '🤖';

            var contentDiv = document.createElement('div');
            contentDiv.className = 'chat-msg-content';

            msgDiv.appendChild(avatar);
            msgDiv.appendChild(contentDiv);
            messages.appendChild(msgDiv);

            var idx = 0;
            var step = Math.max(2, Math.floor(content.length / 150));
            var speed = Math.max(8, Math.min(20, 2500 / content.length));

            function doType() {
                idx += step;
                if (idx >= content.length) {
                    contentDiv.innerHTML = renderMarkdown(content);
                    addCodeBlockButtons(contentDiv);
                    messages.scrollTop = messages.scrollHeight;
                    isGenerating = false;
                    document.getElementById('sendBtn').disabled = false;
                    return;
                }
                contentDiv.innerHTML = renderMarkdown(content.substring(0, idx));
                messages.scrollTop = messages.scrollHeight;
                setTimeout(doType, speed);
            }
            doType();
        }

        // 发送消息
        function sendMessage() {
            if (isGenerating) return;

            var input = document.getElementById('chatInput');
            var message = input.value.trim();
            if (!message) return;

            if (attachCode) {
                toggleAttachCode();
            }

            addChatMessage('user', message);
            input.value = '';
            input.style.height = 'auto';

            isGenerating = true;
            document.getElementById('sendBtn').disabled = true;
            addTypingIndicator();

            var query = message;
            setTimeout(function() {
                removeTypingIndicator();
                processMessage(query);
            }, 500);
        }

        // 查找相关话题
        function findRelatedTopics(currentEntry) {
            var related = [];
            for (var i = 0; i < KB.length; i++) {
                if (KB[i].t === currentEntry.t) continue;
                var overlap = 0;
                for (var j = 0; j < currentEntry.k.length; j++) {
                    for (var m = 0; m < KB[i].k.length; m++) {
                        if (currentEntry.k[j] === KB[i].k[m]) overlap += 2;
                    }
                }
                if (currentEntry.a.toLowerCase().includes(KB[i].k[0])) overlap++;
                var titleWords = KB[i].t.split(/[\s\/()（）]+/);
                for (var tw = 0; tw < titleWords.length; tw++) {
                    if (titleWords[tw].length >= 2 && currentEntry.a.includes(titleWords[tw])) overlap++;
                }
                if (overlap > 0) related.push({ entry: KB[i], score: overlap });
            }
            related.sort(function(a, b) { return b.score - a.score; });
            return related.slice(0, 4);
        }

        // 本地知识库处理消息
        function processMessage(query) {
            var q = query.toLowerCase();

            // 特殊命令
            if (q === '帮助' || q === 'help' || q === '?' || q === '？' || q === '话题' || q === '列表' || q === '目录') {
                typeResponse(getTopicList());
                return;
            }

            // 搜索知识库
            var result = searchKB(query);
            if (result) {
                var answer = KB_DETAILED[result.t] || result.a;
                var response = '**' + result.t + '**\n\n' + answer;
                typeResponse(response);
                return;
            }

            // 如果用户的消息中包含代码相关关键词，尝试分析编辑器中的代码
            var codeKeywords = ['我的代码', '这段代码', '帮我看看', '什么问题', '怎么改', '帮我写', '报错', '不对'];
            var wantsCodeHelp = false;
            for (var i = 0; i < codeKeywords.length; i++) {
                if (q.includes(codeKeywords[i])) { wantsCodeHelp = true; break; }
            }

            if (wantsCodeHelp) {
                var code = editor.getValue();
                if (code.trim()) {
                    var info = analyzeCode(code);
                    var resp = '我看了你编辑器中的代码，以下是分析：\n\n';
                    if (info.issues.length > 0) {
                        resp += '**发现的问题：**\n';
                        for (var i = 0; i < info.issues.length; i++) {
                            resp += '- ' + info.issues[i] + '\n';
                        }
                        resp += '\n';
                    }
                    resp += '你可以点击下方的快捷按钮获取更详细的分析，或者输入具体的 C++ 关键词来查看相关知识。';
                    typeResponse(resp);
                } else {
                    typeResponse('编辑器中还没有代码。请先在左边的编辑器中写入代码，然后我可以帮你分析。');
                }
                return;
            }

            // 没找到匹配
            var fallback = '抱歉，我暂时没有找到关于 **"' + query + '"** 的内容。\n\n';
            fallback += '你可以试试：\n';
            fallback += '- 输入 C++ 关键词，如 **指针**、**vector**、**类**、**排序** 等\n';
            fallback += '- 使用下方的快捷按钮分析编辑器中的代码\n';
            fallback += '- 输入 **帮助** 查看所有可用话题\n\n';
            fallback += '以下是我能回答的部分话题：\n';
            // 随机推荐5个话题
            var shuffled = KB.slice().sort(function() { return 0.5 - Math.random(); });
            for (var i = 0; i < Math.min(5, shuffled.length); i++) {
                fallback += '- ' + shuffled[i].t + '\n';
            }
            typeResponse(fallback);
        }

        // ===== 使用 Kimi API 覆盖本地知识库逻辑 =====
        function buildAiPrompt(userText, options) {
            const code = editor.getValue();
            const useCode = options && options.withCode && code.trim();
            const action = options && options.action ? options.action : '';

            let prompt = userText;

            if (action) {
                const actionMap = {
                    explain: '请详细解释下面这段 C++ 代码，包括每部分作用、思路和复杂度（如果适用）。',
                    debug: '请找出下面 C++ 代码中的错误或风险点，并给出可直接替换的修复代码。',
                    optimize: '请优化下面 C++ 代码，说明瓶颈并给出优化后的完整代码和原因。',
                    comment: '请给下面 C++ 代码添加高质量中文注释，并返回完整代码。',
                    complete: '请根据下面 C++ 代码上下文补全缺失部分，并返回完整可编译代码。'
                };
                prompt = actionMap[action] || userText;
            }

            if (useCode) {
                prompt += '\n\n这是我当前编辑器中的代码：\n```cpp\n' + code + '\n```';
            }

            return prompt;
        }

        async function callKimi(prompt) {
            const endpoint = kimiConfig.baseUrl.replace(/\/$/, '') + '/chat/completions';
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + kimiConfig.apiKey
                },
                body: JSON.stringify({
                    model: kimiConfig.model,
                    temperature: kimiConfig.temperature,
                    stream: true,
                    messages: [
                        {
                            role: 'system',
                            content: '你是一个专业 C++ 教学与编程助手。请用中文回答。回答要详细、结构清晰、可执行。若涉及代码，优先给完整可编译示例，并解释关键点与常见坑。'
                        }
                    ].concat(chatHistory.slice(-12)).concat([{ role: 'user', content: prompt }])
                })
            });

            if (!response.ok) {
                const errText = await response.text();
                throw new Error('Kimi API 请求失败: ' + response.status + ' ' + errText.slice(0, 200));
            }

            const messages = document.getElementById('chatMessages');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'chat-msg bot';

            const avatar = document.createElement('div');
            avatar.className = 'chat-msg-avatar';
            avatar.textContent = '🤖';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'chat-msg-content';
            contentDiv.innerHTML = '<p style="opacity:0.6">正在思考...</p>';

            msgDiv.appendChild(avatar);
            msgDiv.appendChild(contentDiv);
            messages.appendChild(msgDiv);

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let full = '';
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop() || '';

                for (const line of lines) {
                    const t = line.trim();
                    if (!t.startsWith('data: ')) continue;
                    const data = t.slice(6);
                    if (data === '[DONE]') continue;
                    try {
                        const json = JSON.parse(data);
                        const delta = json.choices?.[0]?.delta?.content;
                        if (delta) {
                            full += delta;
                            contentDiv.innerHTML = renderMarkdown(full);
                            messages.scrollTop = messages.scrollHeight;
                        }
                    } catch (_) {}
                }
            }

            contentDiv.innerHTML = renderMarkdown(full || '（空响应）');
            addCodeBlockButtons(contentDiv);
            messages.scrollTop = messages.scrollHeight;
            chatHistory.push({ role: 'assistant', content: full || '（空响应）' });
        }

        async function runAiRequest(displayText, prompt, options) {
            if (isGenerating) return;
            isGenerating = true;
            document.getElementById('sendBtn').disabled = true;
            addChatMessage('user', displayText);
            addTypingIndicator();

            try {
                removeTypingIndicator();
                const finalPrompt = buildAiPrompt(prompt, options || {});
                chatHistory.push({ role: 'user', content: finalPrompt });
                await callKimi(finalPrompt);
            } catch (err) {
                removeTypingIndicator();
                addChatMessage('bot', '❌ 调用 Kimi 失败：' + err.message + '\n\n请检查：\n- API Key 是否正确\n- 网络是否正常\n- Kimi 服务是否可用');
            } finally {
                isGenerating = false;
                document.getElementById('sendBtn').disabled = false;
            }
        }

        // 覆盖快捷操作：走 AI
        quickAction = function(action) {
            const code = editor.getValue();
            if (!code.trim()) {
                showChatNotification('编辑器中没有代码', 'error');
                return;
            }
            const label = quickActionLabels[action] || 'AI 分析';
            runAiRequest(label + ' [当前编辑器代码]', label, { withCode: true, action: action });
        };

        // 覆盖发送：走 AI
        sendMessage = function() {
            if (isGenerating) return;
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;

            const withCode = attachCode;
            if (attachCode) toggleAttachCode();
            input.value = '';
            input.style.height = 'auto';

            runAiRequest(message, message, { withCode: withCode });
        };

        // 覆盖本地 processMessage（保留兼容）
        processMessage = function(query) {
            runAiRequest(query, query, { withCode: false });
        };
    </script>
