<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二进制特训 (Binary Blitz)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            color: #333;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
            position: relative;
            overflow: hidden;
        }
        h1 {
            margin-top: 0;
            color: #2c3e50;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        .level-info {
            background: #ecf0f1;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .level-badge {
            background: #3498db;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
        }
        .progress-container {
            flex-grow: 1;
            margin: 0 15px;
            background: #bdc3c7;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: #2ecc71;
            width: 0%;
            transition: width 0.3s ease;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 15px;
            font-size: 1rem;
            color: #666;
        }
        .stat-box strong {
            font-size: 1.2rem;
            color: #2c3e50;
            margin-left: 5px;
        }
        .binary-display {
            font-family: 'Courier New', Courier, monospace;
            font-size: 3rem;
            font-weight: bold;
            margin: 20px 0;
            letter-spacing: 5px;
            color: #3498db;
        }
        .bit-hints {
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
            height: 20px;
            color: #95a5a6;
            font-size: 0.8rem;
            font-family: 'Courier New', Courier, monospace;
        }
        .bit-hint-val {
            width: 1ch;
            margin: 0 2.5px;
            text-align: center;
            display: inline-block;
            width: 30px;
        }
        input[type="number"] {
            font-size: 2rem;
            padding: 10px;
            width: 150px;
            text-align: center;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-bottom: 20px;
            outline: none;
        }
        input[type="number"]:focus {
            border-color: #3498db;
        }
        button.action-btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }
        button.action-btn:hover {
            background-color: #27ae60;
        }
        .feedback {
            height: 30px;
            margin-top: 10px;
            font-weight: bold;
        }
        .correct { color: #2ecc71; }
        .wrong { color: #e74c3c; }
        
        .controls {
            margin-top: 20px;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
        .hint-toggle {
            font-size: 0.9rem;
            color: #7f8c8d;
            cursor: pointer;
        }

        /* Modal for Level Up */
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            display: none;
        }
        .modal-content {
            text-align: center;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .level-up-title {
            color: #f39c12;
            font-size: 2.5rem;
            margin: 0 0 20px 0;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
        }
        .modal-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.2rem;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }
        .modal-btn:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>二进制闯关</h1>
    
    <div class="level-info">
        <div class="level-badge" id="levelBadge">Lv.1</div>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div id="progressText">0/5</div>
    </div>

    <div class="stats">
        <div class="stat-box">得分: <strong><span id="score">0</span></strong></div>
        <div class="stat-box">连对: <strong><span id="streak">0</span></strong></div>
    </div>

    <div class="bit-hints" id="bitHints" style="opacity: 0;"></div>

    <div class="binary-display" id="binaryNumber">000</div>

    <input type="number" id="decimalInput" placeholder="?" autofocus>
    <br>
    <button class="action-btn" onclick="checkAnswer()">提交 (Enter)</button>

    <div class="feedback" id="feedback"></div>

    <div class="controls">
        <div class="hint-toggle">
            <label>
                <input type="checkbox" id="showHints" onchange="toggleHints()"> 显示位权提示 (8, 4, 2, 1...)
            </label>
        </div>
    </div>

    <!-- Level Up Modal -->
    <div class="modal-overlay" id="levelModal">
        <div class="modal-content">
            <h2 class="level-up-title">闯关成功!</h2>
            <p id="levelUpMsg">准备好进入下一关了吗？</p>
            <button class="modal-btn" onclick="nextLevel()">下一关</button>
        </div>
    </div>
    
    <!-- Game Complete Modal -->
    <div class="modal-overlay" id="victoryModal">
        <div class="modal-content">
            <h2 class="level-up-title" style="color: #2ecc71;">通关!</h2>
            <p>你已经成为了二进制大师!</p>
            <p>最终得分: <strong id="finalScore"></strong></p>
            <button class="modal-btn" onclick="restartGame()">重新开始</button>
        </div>
    </div>
</div>

<script>
    // Game Configuration
    const levels = [
        { level: 1, bits: 3, required: 5, name: "新手入门 (3位)" },
        { level: 2, bits: 4, required: 5, name: "初窥门径 (4位)" },
        { level: 3, bits: 5, required: 8, name: "渐入佳境 (5位)" },
        { level: 4, bits: 6, required: 10, name: "高手进阶 (6位)" },
        { level: 5, bits: 8, required: 10, name: "大师挑战 (8位)" }
    ];

    let currentLevelIndex = 0;
    let levelProgress = 0;
    let currentDecimal = 0;
    let score = 0;
    let streak = 0;

    // DOM Elements
    const binaryDisplay = document.getElementById('binaryNumber');
    const decimalInput = document.getElementById('decimalInput');
    const feedback = document.getElementById('feedback');
    const scoreDisplay = document.getElementById('score');
    const streakDisplay = document.getElementById('streak');
    const bitHints = document.getElementById('bitHints');
    const levelBadge = document.getElementById('levelBadge');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');
    const levelModal = document.getElementById('levelModal');
    const victoryModal = document.getElementById('victoryModal');
    const levelUpMsg = document.getElementById('levelUpMsg');

    function initGame() {
        currentLevelIndex = 0;
        score = 0;
        streak = 0;
        startLevel();
    }

    function startLevel() {
        levelProgress = 0;
        updateLevelUI();
        generateNumber();
        levelModal.style.display = 'none';
        decimalInput.focus();
    }

    function updateLevelUI() {
        const config = levels[currentLevelIndex];
        levelBadge.innerText = `Lv.${config.level}`;
        levelBadge.title = config.name;
        updateProgress();
    }

    function updateProgress() {
        const config = levels[currentLevelIndex];
        const percentage = (levelProgress / config.required) * 100;
        progressBar.style.width = `${percentage}%`;
        progressText.innerText = `${levelProgress}/${config.required}`;
    }

    function generateNumber() {
        const config = levels[currentLevelIndex];
        const bits = config.bits;
        const max = Math.pow(2, bits) - 1;
        
        // Generate random number
        let newDecimal;
        do {
            newDecimal = Math.floor(Math.random() * (max + 1));
        } while (newDecimal === currentDecimal && max > 1); // Avoid repeat
        
        currentDecimal = newDecimal;
        
        let binaryString = currentDecimal.toString(2);
        
        // Pad with zeros
        while (binaryString.length < bits) {
            binaryString = "0" + binaryString;
        }

        binaryDisplay.innerText = binaryString;
        decimalInput.value = '';
        
        updateHints(binaryString, bits);
    }

    function updateHints(binaryString, bits) {
        bitHints.innerHTML = '';
        for (let i = 0; i < bits; i++) {
            const power = bits - 1 - i;
            const val = Math.pow(2, power);
            const span = document.createElement('span');
            span.className = 'bit-hint-val';
            span.innerText = val;
            bitHints.appendChild(span);
        }
    }

    function checkAnswer() {
        const userVal = parseInt(decimalInput.value);
        if (isNaN(userVal)) return;

        if (userVal === currentDecimal) {
            handleCorrect();
        } else {
            handleWrong();
        }
        
        scoreDisplay.innerText = score;
        streakDisplay.innerText = streak;
    }

    function handleCorrect() {
        const config = levels[currentLevelIndex];
        
        feedback.innerText = "正确!";
        feedback.className = "feedback correct";
        
        score += 10 + (streak * 2);
        streak++;
        levelProgress++;
        
        updateProgress();

        if (levelProgress >= config.required) {
            // Level Complete
            setTimeout(showLevelComplete, 500);
        } else {
            setTimeout(generateNumber, 400);
        }
    }

    function handleWrong() {
        feedback.innerText = `错误! 是 ${currentDecimal}`;
        feedback.className = "feedback wrong";
        streak = 0;
        // Optional: Penalty or just stay on same level? 
        // Let's just reset streak and keep going.
    }

    function showLevelComplete() {
        if (currentLevelIndex >= levels.length - 1) {
            // Game Won
            document.getElementById('finalScore').innerText = score;
            victoryModal.style.display = 'flex';
        } else {
            // Next Level
            const nextConfig = levels[currentLevelIndex + 1];
            levelUpMsg.innerText = `即将进入: ${nextConfig.name}`;
            levelModal.style.display = 'flex';
            // Auto focus button for keyboard users
            levelModal.querySelector('button').focus();
        }
    }

    function nextLevel() {
        currentLevelIndex++;
        startLevel();
    }

    function restartGame() {
        victoryModal.style.display = 'none';
        initGame();
    }

    function toggleHints() {
        const checkbox = document.getElementById('showHints');
        bitHints.style.opacity = checkbox.checked ? '1' : '0';
    }

    // Event Listeners
    decimalInput.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            checkAnswer();
        }
    });

    // Start
    initGame();
</script>

</body>
</html>
